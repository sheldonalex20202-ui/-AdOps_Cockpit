name: Desktop Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: adops-desktop/go.mod
          cache-dependency-path: adops-desktop/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: adops-desktop/frontend/package-lock.json

      - name: Install NSIS
        run: choco install nsis --yes

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend dependencies
        working-directory: adops-desktop/frontend
        run: npm ci

      - name: Build Windows installer
        working-directory: adops-desktop
        run: wails build -platform windows/amd64 -nsis -ldflags "-X main.Version=${{ github.ref_name }}"

      - name: Rename installer to stable filename
        shell: pwsh
        run: |
          $src = Get-ChildItem "adops-desktop/build/bin/*.exe" | Select-Object -First 1
          Rename-Item $src.FullName "AdOpsCockpit-windows-installer.exe"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: adops-desktop/build/bin/AdOpsCockpit-windows-installer.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: adops-desktop/go.mod
          cache-dependency-path: adops-desktop/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: adops-desktop/frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend dependencies
        working-directory: adops-desktop/frontend
        run: npm ci

      - name: Build macOS (Intel)
        working-directory: adops-desktop
        run: wails build -platform darwin/amd64 -ldflags "-X main.Version=${{ github.ref_name }}"

      - name: Build macOS (Apple Silicon)
        working-directory: adops-desktop
        run: wails build -platform darwin/arm64 -ldflags "-X main.Version=${{ github.ref_name }}"

      - name: Create DMG (Intel)
        run: |
          hdiutil create \
            -volname "AdOps Cockpit" \
            -srcfolder "adops-desktop/build/bin/adops-desktop.app" \
            -ov -format UDZO \
            "adops-desktop/build/bin/AdOpsCockpit-macos-intel.dmg"

      - name: Create DMG (Apple Silicon)
        run: |
          hdiutil create \
            -volname "AdOps Cockpit" \
            -srcfolder "adops-desktop/build/bin/adops-desktop-arm64.app" \
            -ov -format UDZO \
            "adops-desktop/build/bin/AdOpsCockpit-macos-arm64.dmg" || true

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: adops-desktop/build/bin/AdOpsCockpit-macos-*.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: release/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos
          path: release/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: AdOps Cockpit ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/windows/AdOpsCockpit-windows-installer.exe
            release/macos/AdOpsCockpit-macos-intel.dmg
            release/macos/AdOpsCockpit-macos-arm64.dmg

      - name: Update Vercel LATEST_APP_VERSION env variable
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          curl -s -X PATCH \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"LATEST_APP_VERSION\",\"value\":\"${{ github.ref_name }}\",\"type\":\"plain\",\"target\":[\"production\",\"preview\"]}" || true
